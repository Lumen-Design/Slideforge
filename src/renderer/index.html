<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Lock down the renderer: no remote code, no inline eval beyond what Vite needs in dev. -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; img-src 'self' data: blob:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; font-src 'self' data:; worker-src 'self' blob:; connect-src 'self' ws: http: https: data: blob:;"
    />
    <title>SlideForge for ProPresenter</title>
  </head>
  <body class="bg-forge-black">
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
